version: 1

# Branding
extends:
  - branding/ecmwf.yml

project:
  title: ECMWF internal earthkit training, March 2026
  license: Apache-2.0
  open_access: true
  exclude:
    - developer/*
  github: ecmwf-training/2026-earthkit-training
  thebe:
    binder:
      repo: ecmwf-training/2026-earthkit-training
      provider: github
      url: https://mybinder.org
      ref: main
  exports:
    - format: pdf
      template: plain_latex_book
      output: exports/book.pdf
  toc:
    - file: content/index.md
    - title: earthkit-data
      file: content/earthkit-data/index.md
      children:
        - file: content/earthkit-data/ekd-1-setup.ipynb
        - file: content/earthkit-data/ekd-2-grib.ipynb
        - file: content/earthkit-data/ekd-3-netcdf.ipynb
        - file: content/earthkit-data/ekd-4-bufr.ipynb
        - file: content/earthkit-data/ekd-5-stream.ipynb
        - file: content/earthkit-data/ekd-6-targets.ipynb
        - file: content/earthkit-data/solutions/solutions.md
          children:
          - file: content/earthkit-data/solutions/ekd-2-grib-solutions.ipynb
          - file: content/earthkit-data/solutions/ekd-3-netcdf-solutions.ipynb
          - file: content/earthkit-data/solutions/ekd-4-bufr-solutions.ipynb
          - file: content/earthkit-data/solutions/ekd-5-stream-solutions.ipynb
          - file: content/earthkit-data/solutions/ekd-6-targets-solutions.ipynb
    - title: earthkit-plots
      file: content/earthkit-plots/index.md
      children:
        - file: content/earthkit-plots/ekp-1-introduction.ipynb
        - file: content/earthkit-plots/ekp-2-formats.ipynb
        - file: content/earthkit-plots/ekp-3-grid-types.ipynb
        - file: content/earthkit-plots/ekp-4-other-plots.ipynb

    - title: earthkit-geo
      file: content/earthkit-geo/index.md
      children:
        - file: content/earthkit-geo/ekg-1-grids.ipynb
    - title: earthkit-transforms
      file: content/earthkit-transforms/index.md
      children:
        - file: content/earthkit-transforms/01-temporal.md
          children:
          - file: content/earthkit-transforms/01a-temporal-aggregations.ipynb
          - file: content/earthkit-transforms/01b-temporal-aggregations-daily-monthly.ipynb
          - file: content/earthkit-transforms/01c-temporal-accumulation-to-rate.ipynb
          - file: content/earthkit-transforms/01d-temporal-challenge.ipynb
            title: "Challenge 1 - Calculate and plot daily and monthly mean data"
            children:
            - file: content/earthkit-transforms/solutions/01d-temporal-solutions.ipynb
              title: Solution
        - file: content/earthkit-transforms/02-spatial.md
          children:
          - file: content/earthkit-transforms/02a-mask-regular-data.ipynb
          - file: content/earthkit-transforms/02b-reduce-data-over-geometries.ipynb
          - file: content/earthkit-transforms/02c-spatial-challenge.ipynb
            title: "Challenge 2 - Reduce data over geometries with extra kwargs"
            children:
            - file: content/earthkit-transforms/solutions/02c-spatial-solutions.ipynb
              title: Solution
        - file: content/earthkit-transforms/03-climatology.md
          children:
          - file: content/earthkit-transforms/03a-calculate-and-plot-climatologies.ipynb
          - file: content/earthkit-transforms/03b-climate-stripes.ipynb
          - file: content/earthkit-transforms/03c-climatology-challenge.ipynb
            title: "Challenge 3 - Calculate and plot climatology quantiles"
            children:
            - file: content/earthkit-transforms/solutions/03c-climatology-solution.ipynb
              title: Solution
    - title: End of day one challenge
      file: content/extras/end-of-day-one-challenge.ipynb
      children:
        - file: content/extras/solutions/end-of-day-one-challenge-solution.ipynb
          title: Solution
    - title: earthkit-meteo
      file: content/earthkit-meteo/index.md
      children:
        - file: content/earthkit-meteo/ekm-1-wind.ipynb
        - file: content/earthkit-meteo/ekm-2-thermo.ipynb
        - file: content/earthkit-meteo/ekm-3-vertical.ipynb
    - title: earthkit-hydro
      file: content/earthkit-hydro/index.md 
      children:
        - file: content/earthkit-hydro/ekh-1-getting-started.ipynb
        - file: content/earthkit-hydro/ekh-2-river-accumulations.ipynb
        - file: content/earthkit-hydro/ekh-3-catchment-statistics.ipynb
        - file: content/earthkit-hydro/ekh-4-distances-lengths.ipynb
        - file: content/earthkit-hydro/ekh-5-xarray-gpu-support.ipynb

site:
  template: book-theme
  options:
    folders: true
