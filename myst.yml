version: 1

# Branding
extends:
  - branding/ecmwf.yml

project:
  title: ECMWF internal earthkit training, March 2026
  license: Apache-2.0
  open_access: true
  exclude:
    - developer/*
  github: ecmwf-training/jupyter-template
  thebe:
    binder:
      repo: ecmwf-training/jupyter-template
      provider: github
      url: https://mybinder.org
      ref: develop
  exports:
    - format: pdf
      template: plain_latex_book
      output: exports/book.pdf
  toc:
    - file: content/index.md
    - title: earthkit-data
      file: content/earthkit-data/index.md
      children:
        - file: content/earthkit-data/ekd-1-setup.ipynb
        - file: content/earthkit-data/ekd-2-grib.ipynb
        - file: content/earthkit-data/ekd-3-netcdf.ipynb
        - file: content/earthkit-data/ekd-4-bufr.ipynb
        - file: content/earthkit-data/ekd-5-stream.ipynb
        - file: content/earthkit-data/ekd-6-targets.ipynb
    - title: earthkit-plots
      file: content/earthkit-plots/index.md
      children:
        - file: content/earthkit-plots/grid-types.ipynb
    - title: earthkit-geo
      file: content/earthkit-geo/index.md
      children:
        - file: content/earthkit-geo/ekg-1-grids.ipynb
    - title: earthkit-transforms
      file: content/earthkit-transforms/index.md
      children:
        - file: content/earthkit-transforms/01-calculate-and-plot-daily-monthly-mean-data.ipynb
        - file: content/earthkit-transforms/02-reduce-era5-data-over-geometries.ipynb
    - title: earthkit-meteo
      file: content/earthkit-meteo/index.md
      children:
        - file: content/earthkit-meteo/ekm-1-wind.ipynb
        - file: content/earthkit-meteo/ekm-2-thermo.ipynb
        - file: content/earthkit-meteo/ekm-3-vertical.ipynb
    - title: earthkit-hydro
      file: content/earthkit-hydro/index.md 
      children:
        - file: content/earthkit-hydro/ekh-1-getting-started.ipynb
        - file: content/earthkit-hydro/ekh-2-river-accumulations.ipynb
        - file: content/earthkit-hydro/ekh-3-catchment-statistics.ipynb
        - file: content/earthkit-hydro/ekh-4-distances-lengths.ipynb
        - file: content/earthkit-hydro/ekh-5-xarray-gpu-support.ipynb

site:
  template: book-theme
  options:
    folders: true
